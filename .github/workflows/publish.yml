name: Docker Build and Publish

# 触发条件：当代码推送到 main 分支，或者手动触发时执行
on:
    push:
        branches: ["main", "master"]
    workflow_dispatch:

env:
    DOCKER_IMAGE: banned2054/danmakudownloader

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Extract Version from csproj
              id: get_version
              run: |
                  VERSION=$(grep -oP '(?<=<Version>).*?(?=</Version>)' DanmakuDownloader/DanmakuDownloader.csproj | head -1)

                  if [ -z "$VERSION" ]; then
                    echo "Warning: No <Version> tag found in csproj, defaulting to 1.0.0"
                    VERSION="1.0.0"
                  fi

                  echo "Extracted version: $VERSION"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./DanmakuDownloader/Dockerfile
                  push: true
                  tags: |
                      ${{ env.DOCKER_IMAGE }}:latest
                      ${{ env.DOCKER_IMAGE }}:${{ env.VERSION }}
